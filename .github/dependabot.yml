version: 2
updates:
  # GitHub Actions used in the workflows (.github/workflows)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"

  # Maven dependencies and build plugins across the multi-module reactor
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
