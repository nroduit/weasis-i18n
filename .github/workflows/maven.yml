name: Build
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
concurrency:
  group: build-publish
  cancel-in-progress: false
# Least privilege: this workflow only reads the current repo; the push to
# nroduit/mvn-repo uses a dedicated PAT (secrets.API_TOKEN_GITHUB), not GITHUB_TOKEN.
permissions:
  contents: read
jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: main
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build weasis-i18n-dist
        run: |
          mvn -B clean install -Dtransifex.token=${{ secrets.TRANSIFEX_TOKEN }} -f main
      - name: Checkout mvn-repo repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: nroduit/mvn-repo
          path: mvn-repo
          token: ${{ secrets.API_TOKEN_GITHUB }}
      - name: Commit the maven packages
        run: |
          cd mvn-repo
          PKGFOLDER="org/weasis/weasis-i18n-dist/4.0.0-SNAPSHOT"
          SRC=~/.m2/repository/${PKGFOLDER}
          mkdir -p ${PKGFOLDER}

          # The build stamps a timestamp build number, so the artifacts differ on
          # every run. To avoid republishing when nothing actually changed, hash the
          # translated .properties content (which is timestamp-free) and compare it
          # with the hash stored from the previous publish.
          NEWHASH=$(cd "${GITHUB_WORKSPACE}/main" && \
            find . -path '*/target/classes/*' -name '*.properties' \
            | LC_ALL=C sort | xargs sha256sum | sha256sum | awk '{print $1}')
          HASHFILE="${PKGFOLDER}/translations.sha256"
          if [ -f "${HASHFILE}" ] && [ "$(cat ${HASHFILE})" = "${NEWHASH}" ]; then
            echo "No translation change since last publish; skipping."
            exit 0
          fi
          echo "${NEWHASH}" > "${HASHFILE}"

          # Publish the freshly built snapshot artifacts (pom is required so the
          # metadata generator can detect the artifact and checksum everything).
          cp -v ${SRC}/weasis-i18n-dist-*.war ${PKGFOLDER}
          cp -v ${SRC}/weasis-i18n-dist-*.zip ${PKGFOLDER}
          cp -v ${SRC}/weasis-i18n-dist-*.pom ${PKGFOLDER}
          # Stable alias consumed by downstream builds.
          cp -v ${PKGFOLDER}/weasis-i18n-dist-*.war ${PKGFOLDER}/weasis-i18n.war
          # Regenerate maven-metadata.xml + .sha1/.md5 for the whole repo. This bumps
          # the snapshot's lastUpdated, which is what makes consumers re-download it.
          python3 update-repo.py

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "update weasis-i18n-dist snapshot" || echo "Nothing to commit"
          git push
